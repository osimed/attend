name: attend
description: "Manage daily attendance of employees"
publish_to: 'none'

version: 1.1.2+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  two_dimensional_scrollables: ^0.3.8
  flutter_bloc: ^9.1.1
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  path_provider: ^2.1.5
  get_it: ^9.2.1
  pdf: ^3.12.0
  open_file: ^3.5.11
  path: ^1.9.1
  flutter_typeahead: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.31.0
  build_runner: ^2.11.0

dependency_overrides:
  pdf:
    git:
      url: https://github.com/Gustl22/dart_pdf.git
      path: pdf
      ref: 313-column-span

flutter:
  uses-material-design: true
